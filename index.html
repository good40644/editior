<!DOCTYPE html>
<html lang="zh-TW" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>流金編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES — DARK & LIGHT THEMES
══════════════════════════════════════════ */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3045;
  --gold:#f0b429;--gold2:#ffd166;--text:#e8eaf0;--text2:#8b92a8;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--radius:10px;
  --panel-right-bg:#fff;--preview-color:#333;--preview-bg:#fff;
  --panel-right-header:#f5f5f0;--panel-right-border:#ddd;
}
body.light-theme {
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#eef0f5;--border:#d0d5e0;
  --text:#1a1d2e;--text2:#5a6080;
  --panel-right-bg:#ffffff;--preview-color:#222;--preview-bg:#fff;
  --panel-right-header:#f0f0f0;--panel-right-border:#ddd;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;height:100vh;display:flex;flex-direction:column;font-size:14px;overflow:hidden;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#181c27,#1a1f30);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;z-index:100;flex-wrap:wrap;flex-shrink:0;}
body.light-theme header{background:linear-gradient(135deg,#e8ecf5,#dde2f0);}
.logo{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
.subtitle{font-size:11px;color:var(--text2);}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hint-badge{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;}
.hint-badge b{color:var(--gold);}

/* ── MAIN LAYOUT ── */
.main{display:grid;grid-template-columns:240px 1fr 1fr;flex:1;min-height:0;overflow:hidden;}

/* ── LEFT PANEL ── */
.panel-left{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.panel-left::-webkit-scrollbar{width:3px;}
.panel-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.section-group{border-bottom:1px solid var(--border);}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.section-header:hover{background:var(--surface2);}
.section-header .sec-title{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text2);text-transform:uppercase;}
.section-header .sec-arrow{font-size:10px;color:var(--text2);transition:transform .2s;}
.section-header.collapsed .sec-arrow{transform:rotate(-90deg);}
.section-body{overflow:hidden;}
.section-body.hidden{display:none;}

.tag-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:none;border:none;cursor:pointer;color:var(--text);font-family:inherit;font-size:12px;text-align:left;transition:background .15s;border-left:2px solid transparent;}
.tag-btn:hover{background:var(--surface2);border-left-color:var(--gold);}
.tag-btn .icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.tag-btn .label{flex:1;}
.tag-btn .code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);background:var(--bg);padding:1px 5px;border-radius:3px;flex-shrink:0;}
.tag-btn .wrap-hint{display:none;font-size:8px;color:var(--gold);flex-shrink:0;}
body.has-selection .tag-btn.wrappable .wrap-hint{display:block;}
body.has-selection .tag-btn.wrappable{border-left-color:rgba(240,180,41,.35);}
body.has-selection .tag-btn.wrappable:hover{border-left-color:var(--gold);background:rgba(240,180,41,.06);}

/* ── MIDDLE PANEL ── */
.panel-mid{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;height:100%;}
.panel-header{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.panel-header h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}

/* 格式工具列 */
.format-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.fmt-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.fmt-btn:hover{background:var(--surface2);border-color:var(--gold);color:var(--gold);}
.fmt-btn b{font-weight:700;}
.fmt-btn i{font-style:italic;}
.fmt-btn u{text-decoration:underline;}
.fmt-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch;}

#selectionBar{display:none;padding:5px 14px;background:rgba(240,180,41,.1);border-bottom:1px solid rgba(240,180,41,.25);font-size:11px;color:var(--gold);flex-shrink:0;}
#selectionBar.visible{display:flex;align-items:center;gap:6px;}

textarea#editor{flex:1;background:var(--bg);border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;padding:14px;resize:none;caret-color:var(--gold);overflow-y:auto;min-height:0;}
textarea#editor::selection{background:rgba(240,180,41,.2);}
body.light-theme textarea#editor{color:#1a1d2e;}

.editor-footer{padding:6px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap;gap:4px;}
.footer-stats{font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;}

/* ── RIGHT PANEL (preview) ── */
.panel-right{display:flex;flex-direction:column;overflow:hidden;background:var(--preview-bg);position:relative;}
.panel-right .panel-header{background:var(--panel-right-header);border-bottom:1px solid var(--panel-right-border);}
.panel-right .panel-header h3{color:#666;}
#preview{flex:1;overflow-y:auto;padding:18px 22px;font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.8;color:var(--preview-color);background:var(--preview-bg);}

/* ── PANEL 4 (gallery/draft) — fixed right sidebar ── */
.panel-four{
  position:fixed;top:0;right:0;bottom:0;
  width:320px;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:150;
  box-shadow:-4px 0 20px rgba(0,0,0,.25);
  /* smooth slide-in */
  transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.panel-four.open{transform:translateX(0);}
.panel-four .p4-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-four .p4-header h3{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.panel-four .p4-body{flex:1;overflow-y:auto;padding:12px;}
.panel-four .p4-body::-webkit-scrollbar{width:4px;}
.panel-four .p4-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── FLOATING BUTTONS (gallery & draft) ── */
.float-btns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:50;}
/* merged-mode float btns: fixed to bottom-right of viewport */
.float-btns-merged{position:fixed;bottom:20px;right:20px;z-index:140;}
.float-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(0,0,0,.3);transition:all .2s;position:relative;}
.float-btn.active{box-shadow:0 0 0 3px var(--gold),0 4px 14px rgba(0,0,0,.3);}
.float-btn-gallery{background:#1e2333;}
.float-btn-gallery:hover{background:#2a3045;}
.float-btn-draft{background:#1e2333;}
.float-btn-draft:hover{background:#2a3045;}
body.light-theme .float-btn-gallery,body.light-theme .float-btn-draft{background:#e0e4ef;box-shadow:0 4px 14px rgba(0,0,0,.15);}
body.light-theme .float-btn-gallery:hover,body.light-theme .float-btn-draft:hover{background:#cdd2e8;}

/* ── GALLERY MODAL (original grid style) ── */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;max-height:420px;overflow-y:auto;padding-right:2px;}
.gallery-grid::-webkit-scrollbar{width:4px;}
.gallery-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.gallery-item{position:relative;cursor:pointer;border:2px solid transparent;border-radius:8px;overflow:hidden;}
.gallery-item:hover{border-color:var(--gold);}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}
.gallery-item canvas{width:100%;height:100%;display:block;background:#111;}
.gallery-item .gal-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:#1a1a1a;font-size:28px;}
.gallery-item .gal-placeholder span{font-size:9px;color:var(--text2);font-family:'JetBrains Mono',monospace;word-break:break-all;padding:0 4px;text-align:center;}
.gallery-item .gal-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.8);color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1.4;z-index:2;}
.gallery-item:hover .gal-del{opacity:1;}
.gallery-item .gal-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:3px 5px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;text-align:center;pointer-events:none;}
.gallery-empty{color:var(--text2);font-size:12px;text-align:center;padding:24px 10px;grid-column:1/-1;line-height:1.6;}

/* ── CATBOX UPLOAD ── */
.cb-drag-over{border-color:var(--gold)!important;background:rgba(240,180,41,.06)!important;}
.cb-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.cb-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.cb-thumb img,.cb-thumb video{width:100%;height:100%;object-fit:cover;border-radius:6px;}
.cb-info{flex:1;min-width:0;}
.cb-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cb-status{font-size:11px;margin-top:3px;}
.cb-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden;}
.cb-bar{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .2s;}
.cb-url-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.cb-url-box{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--gold);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer;}
.cb-insert-btn{flex-shrink:0;background:var(--gold);color:#000;border:none;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.cb-insert-btn:hover{background:var(--gold2);}

/* ── CATBOX LEFT PANEL BUTTON label update ── */
.gal-list{display:flex;flex-direction:column;gap:8px;}
.gal-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.gal-row:hover{border-color:var(--gold);}
.gal-row-thumb{width:64px;height:64px;flex-shrink:0;background:var(--bg);overflow:hidden;position:relative;}
.gal-row-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gal-row-thumb .gal-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;}
.gal-row-info{flex:1;min-width:0;padding:6px 0;}
.gal-row-type{font-size:9px;color:var(--text2);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:2px;}
.gal-row-url{font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.gal-row-del{flex-shrink:0;background:none;border:none;color:var(--text2);cursor:pointer;padding:6px 10px;font-size:14px;transition:color .15s;}
.gal-row-del:hover{color:var(--red);}

/* ── DRAFT PANEL ── */
.draft-list{display:flex;flex-direction:column;gap:8px;}
.draft-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.draft-item:hover{border-color:var(--gold);}
.draft-item-time{font-size:10px;color:var(--text2);margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.draft-item-preview{font-size:12px;color:var(--text);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.draft-item-actions{display:flex;gap:6px;margin-top:8px;}
.draft-empty{color:var(--text2);font-size:12px;text-align:center;padding:24px 10px;line-height:1.6;}

/* ── BUTTONS ── */
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all .15s;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--text2);}
.btn-blue{background:#1d4ed8;color:#fff;}
.btn-blue:hover{background:#2563eb;}
.btn-sm{padding:3px 8px;font-size:10px;}
.btn-danger{background:none;border:1px solid #e06c75;color:#e06c75;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-danger:hover{background:#e06c75;color:#fff;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto;}
.modal h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--gold);}
.modal label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;margin-top:10px;}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border .15s;}
.modal input:focus,.modal textarea:focus{border-color:var(--gold);}
.modal textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* table builder */
.tbl-builder{margin-top:8px;}
.tbl-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}
.tbl-row input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;}
.tbl-row input:focus{border-color:var(--gold);}
.tbl-del-btn{background:none;border:1px solid #444;border-radius:5px;color:#888;cursor:pointer;padding:4px 8px;font-size:12px;}
.tbl-del-btn:hover{color:var(--red);border-color:var(--red);}
.tbl-add-btn{background:none;border:1px dashed var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:5px;width:100%;font-size:12px;font-family:inherit;transition:all .15s;}
.tbl-add-btn:hover{border-color:var(--gold);color:var(--gold);}

/* postimages steps */
.postimg-steps{}
.postimg-step{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.postimg-step:last-child{border-bottom:none;}
.step-num{width:20px;height:20px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.step-body{flex:1;}
.step-title{font-size:12px;font-weight:600;margin-bottom:3px;}
.step-desc{font-size:11px;color:var(--text2);line-height:1.5;}
.postimg-open-btn{display:inline-block;margin-top:5px;background:var(--gold);color:#000;border:none;border-radius:5px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.postimg-open-btn:hover{background:var(--gold2);}

/* color picker row */
.color-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;}
.color-swatch{width:22px;height:22px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.color-swatch:hover,.color-swatch.active{transform:scale(1.2);border-color:#fff;}
.color-custom{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;padding:2px;}

/* ── TOAST ── */
/* ── GAME ZONE ── */
.game-zone-btn{background:linear-gradient(135deg,#f0b429,#ff6b35);color:#000;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.game-zone-btn:hover{transform:scale(1.05);box-shadow:0 3px 12px rgba(240,180,41,.4);}
.game-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;}
.game-overlay.open{display:flex;}
.game-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:440px;max-width:94vw;max-height:90vh;overflow-y:auto;position:relative;}
.game-panel-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px;}
.game-panel-close:hover{color:var(--text);background:var(--surface2);}
.game-panel-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.game-panel-hint{font-size:12px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.game-item{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:8px;}
.game-item:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(240,180,41,.2);}
.game-item .game-icon{font-size:36px;line-height:1;}
.game-item .game-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.game-item .game-desc{font-size:10px;color:var(--text2);line-height:1.4;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* Emoji */
textarea#editor.dragging{border:2px dashed var(--gold)!important;}
.emoji-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-start;justify-content:flex-start;}
.emoji-modal-overlay.active{display:flex;}
.emoji-panel{background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:320px;max-width:95vw;overflow:hidden;margin:54px 0 0 10px;}
.emoji-tabs{display:flex;border-bottom:1px solid #eee;background:#f8f8f8;}
.emoji-tab{flex:1;padding:8px 4px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#666;border-bottom:2px solid transparent;font-family:inherit;transition:all .15s;}
.emoji-tab.active{color:#b8860b;border-bottom-color:#b8860b;background:#fff;}
.emoji-pages{padding:10px;}
.emoji-page{display:none;}
.emoji-page.active{display:block;}
.emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;min-height:180px;}
.emoji-item{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;border:1px solid transparent;padding:3px;transition:all .15s;background:none;}
.emoji-item:hover{background:#fffbe6;border-color:#e6d87a;}
.emoji-item img{width:100%;height:100%;object-fit:contain;}
.emoji-item .emoji-code{font-size:9px;color:#aaa;text-align:center;line-height:1.2;}
.emoji-pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 10px;border-top:1px solid #eee;}
.emoji-page-btn{width:24px;height:24px;border-radius:4px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:11px;font-weight:600;color:#666;transition:all .15s;}
.emoji-page-btn.active{background:#b8860b;color:#fff;border-color:#b8860b;}

@media (max-width: 768px) {
  /* ── 預設（合併模式）：固定版面 ── */
  body { height:100vh; overflow:hidden; }
  header { padding:7px 10px; gap:6px; flex-wrap:nowrap; overflow-x:auto; }
  header::-webkit-scrollbar{ display:none; }
  .logo { font-size:14px; flex-shrink:0; }

  .btn { padding:4px 8px; font-size:10px; white-space:nowrap; }

  /* ── 主版面（合併模式）：固定高度 flex 直排 ── */
  .main {
    display:flex; flex-direction:column;
    height:calc(100vh - 48px);
    overflow:hidden;
  }

  /* ── 分欄模式：整頁可捲動 ── */
  body.split-mode { height:auto; overflow-y:auto; overflow-x:hidden; }
  body.split-mode .main { height:auto; overflow:visible; flex-direction:column; }
  /* textarea 固定 60vh，工具列正常顯示 */
  body.split-mode .panel-mid { flex:none; height:auto; overflow:visible; }
  body.split-mode textarea#editor {
    height:60vh !important;
    min-height:60vh !important;
    flex:none;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  /* 預覽區固定 60vh，在下方，可內部捲動 */
  body.split-mode .panel-right {
    display:flex !important;
    flex-direction:column;
    flex:none;
    height:60vh;
    min-height:60vh;
    overflow:hidden;
    border-top:2px solid var(--border);
  }
  body.split-mode #preview {
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* ── 左側面板：橫向捲動工具列 ── */
  .panel-left {
    border-right:none; border-bottom:1px solid var(--border);
    overflow-x:auto; overflow-y:hidden;
    display:flex; flex-direction:row;
    max-height:72px; min-height:60px;
    flex-shrink:0;
    padding:4px 6px; gap:0;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  .panel-left::-webkit-scrollbar{ display:none; }
  .section-group {
    display:flex; flex-direction:row; align-items:stretch;
    border-bottom:none; border-right:1px solid var(--border);
    flex-shrink:0;
  }
  .section-header { display:none; }
  .section-body { display:flex !important; flex-direction:row; align-items:center; }
  .section-body.hidden { display:flex !important; }
  .tag-btn {
    flex-direction:column; gap:2px;
    padding:6px 10px; min-width:54px;
    border-left:none; border-bottom:2px solid transparent;
    font-size:10px; white-space:nowrap;
    touch-action:manipulation; /* 防止 300ms 延遲 & 誤觸 */
  }
  .tag-btn:hover { border-left:none; border-bottom-color:var(--gold); }
  .tag-btn .code { display:none; }
  .tag-btn .wrap-hint { display:none !important; }
  .tag-btn .icon { font-size:17px; }
  .tag-btn .label { font-size:10px; }

  /* ── 中間編輯區：flex:1 填滿剩餘空間，textarea 獨立捲動 ── */
  .panel-mid {
    flex:1; min-height:0;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .format-toolbar { gap:2px; padding:4px 6px; flex-shrink:0; overflow-x:auto; flex-wrap:nowrap; }
  .format-toolbar::-webkit-scrollbar{ display:none; }
  .fmt-btn { padding:3px 7px; font-size:11px; flex-shrink:0; touch-action:manipulation; }
  textarea#editor {
    flex:1; min-height:0;
    height:auto !important;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    /* 防止 iOS 自動縮放輸入框 */
    font-size:16px !important;
  }
  .editor-footer { flex-shrink:0; }

  /* ── 預覽區：手機預設隱藏，由 JS toggleSplitMerge 控制 ── */
  /* 不在此寫 display:none，改由 JS 設定，避免分欄時無法覆蓋 */
  #preview { padding:12px 14px; font-size:13px; -webkit-overflow-scrolling:touch; }

  .modal { width:95vw; padding:16px; }

  .float-btns { bottom:12px; right:12px; }
  .float-btn { width:44px; height:44px; font-size:18px; touch-action:manipulation; }

  /* ── Panel 4：底部抽屜 ── */
  .panel-four {
    top:auto; right:0; bottom:0; left:0;
    width:100% !important; height:65vh;
    border-left:none; border-top:1px solid var(--border);
    box-shadow:0 -4px 20px rgba(0,0,0,.3);
    transform:translateY(100%);
    transition:transform .22s cubic-bezier(.4,0,.2,1);
  }
  .panel-four.open { transform:translateY(0); }
  .float-btns-merged { bottom:16px; right:16px; }
}

<script>
/* ═══════════════════════════════════════════
   THEME
═══════════════════════════════════════════ */
let isLightTheme = false;
try{ isLightTheme = localStorage.getItem('liujin_theme') === 'light'; }catch(e){}
function applyTheme(){
  document.body.classList.toggle('light-theme', isLightTheme);
  document.getElementById('themeBtn').textContent = isLightTheme ? '🌙 深色' : '☀️ 淺色';
}
function toggleTheme(){
  isLightTheme = !isLightTheme;
  try{ localStorage.setItem('liujin_theme', isLightTheme ? 'light' : 'dark'); }catch(e){}
  applyTheme();
}
applyTheme();

/* ═══════════════════════════════════════════
   I18N
═══════════════════════════════════════════ */
let lang = 'zh';
const i18n = {
  zh:{subtitle:'',selHint:'💡 <b>選取文字</b>後按功能鍵可包裹標籤',undo:'復原',save:'另存新檔',copyAll:'複製全部',editor:'✏️ 編輯器',clear:'清空',selActive:'已選取文字 — 點選功能鍵可包裹',preview:'👁 論壇預覽',previewHint:'← 從左側選擇標籤開始',refresh:'重新預覽',cancel:'取消',insert:'插入',insert_ok:'✅ 已插入！',copied:'✅ 已複製到剪貼簿！',saved:'✅ 已儲存為文字檔！',cleared:'已清空',confirmClear:'確定要清空編輯器嗎？'},
  en:{subtitle:'',selHint:'💡 <b>Select text</b> then click a tag to wrap',undo:'Undo',save:'Save As',copyAll:'Copy All',editor:'✏️ Editor',clear:'Clear',selActive:'Text selected — click a tag to wrap',preview:'👁 Preview',previewHint:'← Select a tag from the left',refresh:'Refresh',cancel:'Cancel',insert:'Insert',insert_ok:'✅ Inserted!',copied:'✅ Copied to clipboard!',saved:'✅ Saved as text file!',cleared:'Cleared',confirmClear:'Clear the editor?'}
};
function t(k){return i18n[lang][k]||k;}
function toggleLang(){lang=lang==='zh'?'en':'zh';document.getElementById('langBtn').textContent=lang==='zh'?'🌐 EN':'🌐 中文';document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'){el.placeholder=t(k)||el.placeholder;}else{el.innerHTML=i18n[lang][k]||el.innerHTML;}});buildLeftPanel();updatePreview();}

/* ═══════════════════════════════════════════
   UNDO STACK
═══════════════════════════════════════════ */
let undoStack=[];
let undoPtr=-1;
const MAX_UNDO=100;
function pushUndo(val){if(undoPtr<undoStack.length-1)undoStack=undoStack.slice(0,undoPtr+1);undoStack.push(val);if(undoStack.length>MAX_UNDO)undoStack.shift();undoPtr=undoStack.length-1;}
function undoAction(){if(undoPtr>0){undoPtr--;editor.value=undoStack[undoPtr];updatePreview();updateStats();}else if(undoPtr===0){editor.value='';updatePreview();updateStats();}}
function redoAction(){if(undoPtr<undoStack.length-1){undoPtr++;editor.value=undoStack[undoPtr];updatePreview();updateStats();}}
function handleKeyDown(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redoAction();}
  // Force undo checkpoint on Space / Enter / punctuation
  const forceKeys=['Enter',' ','.','。','!','！','?','？',',','，'];
  if(forceKeys.includes(e.key)){
    clearTimeout(undoTimer);
    undoTimer=setTimeout(()=>pushUndo(editor.value),50);
  }
}
/* ═══════════════════════════════════════════
   SMART BBCode AUTO-CLOSE
   當使用者手動輸入 [b] 時自動補上 [/b]
   游標停在兩個標籤中間
═══════════════════════════════════════════ */
function smartAutoClose(e){ /* 已移至 input 事件，此函數保留為空 */ }
let isComposing=false;
/* ─── 預覽 debounce timer ─── */
let undoTimer;
let saveEditorTimer;
let previewTimer;
function schedulePreview(){
  clearTimeout(previewTimer);
  previewTimer=setTimeout(()=>{ updatePreview(); updateStats(); },150);
}

function onEditorInput(){
  if(isComposing)return;
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>pushUndo(editor.value),800);
  // Auto-save to localStorage
  clearTimeout(saveEditorTimer);
  saveEditorTimer=setTimeout(()=>{
    try{localStorage.setItem('liujin_editor_content',editor.value);}catch(e){}
  },600);
  // Auto-detect media
  const val=editor.value;
  let m;
  const imgRe=/\[url=([^\]]+)\]\[img\]([^\[]+)\[\/img\]\[\/url\]/g;
  while((m=imgRe.exec(val))!==null){addToGallery(m[2].trim(),'img');}
  const ximgRe=/\[ximg\]([^\[]+)\[\/ximg\]/g;
  while((m=ximgRe.exec(val))!==null){addToGallery(m[1].trim(),'img');}
  const imgRe2=/\[img\]([^\[]+)\[\/img\]/g;
  while((m=imgRe2.exec(val))!==null){addToGallery(m[1].trim(),'img');}
  ['xmp4','xvmp4'].forEach(tag=>{
    const re=new RegExp('\\['+tag+'\\]([^\\[]+)\\[\\/'+tag+'\\]','g');
    while((m=re.exec(val))!==null){addToGallery(m[1].trim(),'vid');}
  });
  const svRe=/\[xsendvid\]([^\[]+)\[\/xsendvid\]/g;
  while((m=svRe.exec(val))!==null){addToGallery(m[1].trim(),'sendvid');}
  ['xyoutube','xsyoutube'].forEach(tag=>{
    const re=new RegExp('\\['+tag+'\\]([^\\[]+)\\[\\/'+tag+'\\]','g');
    while((m=re.exec(val))!==null){addToGallery(m[1].trim(),'yt');}
  });
  const ttRe=/\[xtiktok\]([^\[]+)\[\/xtiktok\]/g;
  while((m=ttRe.exec(val))!==null){addToGallery(m[1].trim(),'tt');}
  schedulePreview();
}

/* ═══════════════════════════════════════════
   SELECTION  (fixed: no ghost selection from cut)
═══════════════════════════════════════════ */
const editor=document.getElementById('editor');

// auto-close 偵測（獨立監聽，不干擾 oninput）
editor.addEventListener('input',e=>{
  if(isComposing) return;
  if(!e.inputType||e.inputType.startsWith('insert')){
    const pos=editor.selectionStart;
    const before=editor.value.slice(0,pos);
    if(before.endsWith(']')) tryAutoClose();
  }
});
let savedSel={start:0,end:0,text:''};
// Track if the last change was a cut operation
let lastWasCut=false;

/* ═══════════════════════════════════════════
   SMART BBCode AUTO-CLOSE
   輸入 [b] 的瞬間自動補 [/b]，游標停在中間
   用 keyup 偵測 ] 鍵，相容各種輸入方式
═══════════════════════════════════════════ */
const AUTO_CLOSE_TAGS=[
  'b','i','u','strike','xgold','xcenter','xgban','xnote','xwarn',
  'xblue','xgreen','xred','xinfo','xglass','xsmall','xquote','quote',
  'xtag','xrate','xbtn','xspoiler','xcard','ximg','xmp4','xvmp4',
  'xmp3','xsound','xsendvid','xmap','xmaplink','xyoutube','xsyoutube',
  'xtiktok','hide','sell','fly','move','code','url',
  'size','color','backcolor','align','xleft','xright',
];

function tryAutoClose(){
  const pos=editor.selectionStart;
  const before=editor.value.slice(0,pos);
  // 游標前最後一個字元必須是 ]
  if(!before.endsWith(']')) return;
  // 抓開啟標籤，排除關閉標籤 [/xxx]
  const tagMatch=before.match(/\[([a-zA-Z][a-zA-Z0-9]*)(?:=[^\]]+)?]$/);
  if(!tagMatch) return;
  const tagName=tagMatch[1].toLowerCase();
  if(!AUTO_CLOSE_TAGS.includes(tagName)) return;
  // 後面已有關閉標籤就不重複
  const after=editor.value.slice(pos);
  const closeTag=`[/${tagName}]`;
  if(after.startsWith(closeTag)) return;
  // 插入關閉標籤，游標停在兩者之間
  pushUndo(editor.value);
  editor.value=before+closeTag+after;
  editor.selectionStart=editor.selectionEnd=pos;
  try{localStorage.setItem('liujin_editor_content',editor.value);}catch(ex){}
  schedulePreview();
}

// keyup 偵測兩種情況：
// 1. 打 ] 結尾 → 直接觸發
// 2. 游標後面緊接 ] → 打字母/數字時也觸發（處理先打[]再移進去打標籤名的情況）
editor.addEventListener('keyup',e=>{
  if(isComposing) return;
  if(e.key===']'){
    tryAutoClose();
    return;
  }
  // 游標後方是 ] 且輸入的是字母/數字/= → 也嘗試觸發
  if(/^[a-zA-Z0-9=/]$/.test(e.key)){
    const pos=editor.selectionStart;
    const after=editor.value.slice(pos);
    if(after.startsWith(']')){
      // 模擬游標在 ] 之後再檢查
      const fakeBefore=editor.value.slice(0,pos)+']';
      const tagMatch=fakeBefore.match(/\[([a-zA-Z][a-zA-Z0-9]*)(?:=[^\]]+)?]$/);
      if(tagMatch){
        const tagName=tagMatch[1].toLowerCase();
        if(AUTO_CLOSE_TAGS.includes(tagName)){
          const realAfter=editor.value.slice(pos+1); // 跳過那個 ]
          const closeTag=`[/${tagName}]`;
          if(!realAfter.startsWith(closeTag)){
            pushUndo(editor.value);
            const insertPos=pos+1; // ] 之後
            editor.value=editor.value.slice(0,insertPos)+closeTag+editor.value.slice(insertPos);
            editor.selectionStart=editor.selectionEnd=pos; // 游標留在 ] 前（標籤內容區）
            try{localStorage.setItem('liujin_editor_content',editor.value);}catch(ex){}
            schedulePreview();
          }
        }
      }
    }
  }
});

editor.addEventListener('cut',()=>{
  lastWasCut=true;
  // After cut, clear saved selection since content is gone
  setTimeout(()=>{
    lastWasCut=false;
    savedSel={start:editor.selectionStart,end:editor.selectionStart,text:''};
    document.body.classList.remove('has-selection');
    document.getElementById('selectionBar').classList.remove('visible');
  },50);
});

function checkSel(){
  const s=editor.selectionStart,e=editor.selectionEnd,has=s!==e;
  if(has){
    savedSel={start:s,end:e,text:editor.value.slice(s,e)};
  } else {
    // Only clear if truly no selection and not from a cut
    if(!lastWasCut){
      savedSel={start:s,end:s,text:''};
    }
  }
  document.body.classList.toggle('has-selection',has);
  document.getElementById('selectionBar').classList.toggle('visible',has);
}

// selectionchange for mobile
document.addEventListener('selectionchange',()=>{
  if(document.activeElement===editor){
    const s=editor.selectionStart,e=editor.selectionEnd;
    if(s!==e){
      savedSel={start:s,end:e,text:editor.value.slice(s,e)};
      document.body.classList.add('has-selection');
      document.getElementById('selectionBar').classList.add('visible');
    } else {
      // Only clear selection state if we're sure there's none
      // Don't clear if a toolbar button is about to be clicked
    }
  }
});

function getLiveSel(){
  const s=editor.selectionStart,e=editor.selectionEnd;
  if(s!==e){
    const liveText=editor.value.slice(s,e);
    savedSel={start:s,end:e,text:liveText};
    return {start:s,end:e,text:liveText};
  }
  // On mobile, after button tap the editor may lose focus
  // Use savedSel only if it's non-empty AND not from a cut
  if(savedSel.text&&!lastWasCut){
    return savedSel;
  }
  return {start:s,end:s,text:''};
}

function clearSavedSel(){
  savedSel={start:0,end:0,text:''};
  document.body.classList.remove('has-selection');
  document.getElementById('selectionBar').classList.remove('visible');
}

/* ═══════════════════════════════════════════
   INSERT / WRAP
═══════════════════════════════════════════ */
function insertAtCursor(txt){
  pushUndo(editor.value);
  const s=editor.selectionStart,e=editor.selectionEnd;
  editor.value=editor.value.slice(0,s)+txt+editor.value.slice(e);
  editor.selectionStart=editor.selectionEnd=s+txt.length;
  editor.focus();
  try{localStorage.setItem('liujin_editor_content',editor.value);}catch(ex){}
  updatePreview();updateStats();
}
function wrapSel(tag,attr){
  const live=getLiveSel();
  if(!live.text)return;
  const{start,end,text}=live;
  const open=attr?`[${tag}=${attr}]`:`[${tag}]`;
  const close=`[/${tag}]`;
  pushUndo(editor.value);
  const wrapped=open+text+close;
  editor.value=editor.value.slice(0,start)+wrapped+editor.value.slice(end);
  editor.selectionStart=start;
  editor.selectionEnd=start+wrapped.length;
  editor.focus();
  // Clear saved sel after wrap so it doesn't re-wrap on next tap
  savedSel={start:start+wrapped.length,end:start+wrapped.length,text:''};
  document.body.classList.remove('has-selection');
  document.getElementById('selectionBar').classList.remove('visible');
  try{localStorage.setItem('liujin_editor_content',editor.value);}catch(ex){}
  updatePreview();updateStats();
}
const directWrap=['xgold','xcenter','xgban','xnote','xwarn','xblue','xgreen','xred','xinfo','xglass','xsmall','quote','xquote','xtag','b','i','u','strike'];
function wrapOrModal(tag){
  const live=getLiveSel();
  if(live.text&&directWrap.includes(tag)){wrapSel(tag);}
  else{openModal(tag);}
}
function wrapFmt(tag,attr){
  const live=getLiveSel();
  if(live.text){
    wrapSel(tag,attr);
  } else {
    const cursor=`[${tag}${attr?'='+attr:''}][/${tag}]`;
    insertAtCursor(cursor);
    const pos=editor.selectionStart-(tag.length+3+(attr?attr.length+1:0));
    editor.selectionStart=editor.selectionEnd=pos;
  }
}

/* ═══════════════════════════════════════════
   STATS — real text chars (CJK only), images, videos
═══════════════════════════════════════════ */
function updateStats(){
  const v=editor.value;
  // Strip all BBCode tags to get real text
  const stripped=v.replace(/\[[^\]]*\]/g,'');
  // Count CJK chars only
  const cjk=(stripped.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g)||[]).length;
  // Count images
  const imgCount=(v.match(/\[ximg\]|\[img\]|\[url=[^\]]+\]\[img\]/g)||[]).length;
  // Count videos (mp4, youtube, tiktok, sendvid, vmp4)
  const vidCount=(v.match(/\[xmp4\]|\[xvmp4\]|\[xyoutube\]|\[xsyoutube\]|\[xtiktok\]|\[xsendvid\]/g)||[]).length;
  document.getElementById('charCount').textContent=`文字：${cjk}字`;
  document.getElementById('imgCount').textContent=`圖片：${imgCount}`;
  document.getElementById('vidCount').textContent=`影片：${vidCount}`;
}

async function saveFile(){

function fallbackCopy(){
  try{editor.focus();editor.select();editor.setSelectionRange(0,99999);document.execCommand('copy');showToast(t('copied'));}

}
function copyCode(){
  if(!editor.value.trim())return;
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(editor.value).then(()=>showToast(t('copied'))).catch(()=>fallbackCopy());
  }else{fallbackCopy();}
}

let isMerged=false;
function toggleSplitMerge(){
  isMerged=!isMerged;
  const panelRight=document.getElementById('panelRight');
  const main=document.getElementById('mainGrid');
  const splitBtn=document.getElementById('splitMergeBtn');
  const previewBtn=document.getElementById('previewToggleBtn');
  const splitFloat=document.getElementById('floatBtnsSplit');
  const mergedFloat=document.getElementById('floatBtnsMerged');
  const isMobile=window.innerWidth<=768;

  if(isMerged){
    // 合併模式
    panelRight.style.display='none';
    panelRight.style.flexDirection='';
    panelRight.style.borderTop='';
    if(splitFloat)splitFloat.style.display='none';
    if(mergedFloat)mergedFloat.style.display='flex';
    if(!isMobile) main.style.gridTemplateColumns='240px 1fr';
    else main.style.gridTemplateColumns='1fr';
    splitBtn.textContent='分欄';
    previewBtn.style.display='';
    // 手機：移除分欄 class，恢復固定版面
    document.body.classList.remove('split-mode');
  } else {
    // 分欄模式
    if(splitFloat)splitFloat.style.display='flex';
    if(mergedFloat)mergedFloat.style.display='none';
    splitBtn.textContent='合併';
    previewBtn.style.display='none';
    const overlay=document.getElementById('previewOverlay');
    if(overlay)overlay.style.display='none';
    if(!isMobile){
      panelRight.style.display='flex';
      panelRight.style.flexDirection='column';
      panelRight.style.borderTop='';
      main.style.gridTemplateColumns='240px 1fr 1fr';
    } else {
      // 手機：加 split-mode class，CSS 控制版面
      document.body.classList.add('split-mode');
      // 清除 inline style，讓 CSS class 接管
      panelRight.style.display='';
      panelRight.style.flexDirection='';
      panelRight.style.minHeight='';
      panelRight.style.maxHeight='';
      panelRight.style.overflow='';
      panelRight.style.borderTop='';
      main.style.gridTemplateColumns='1fr';
    }
  }
}

/* ═══════════════════════════════════════════
   MEDIA ID PARSING
═══════════════════════════════════════════ */
function extractYTId(input){input=input.trim();if(/^[a-zA-Z0-9_-]{11}$/.test(input))return input;try{const u=new URL(input);if(u.hostname==='youtu.be')return u.pathname.slice(1).split('?')[0];if(u.searchParams.get('v'))return u.searchParams.get('v');const sm=u.pathname.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);if(sm)return sm[1];const em=u.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);if(em)return em[1];}catch(e){}const m=input.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function extractTTId(input){input=input.trim();if(/^\d{15,20}$/.test(input))return input;try{const u=new URL(input);const m=u.pathname.match(/\/video\/(\d+)/);if(m)return m[1];}catch(e){}const m=input.match(/\/video\/(\d+)/);return m?m[1]:null;}
function extractSendvidId(input){input=input.trim();if(/^[a-z0-9]{4,12}$/.test(input))return input;try{const u=new URL(input);const m=u.pathname.match(/\/([a-z0-9]{4,12})$/i);if(m)return m[1];}catch(e){}const m=input.match(/sendvid\.com\/([a-z0-9]{4,12})/i);return m?m[1]:null;}

function prevSendvid(){const v=document.getElementById('f1').value;const id=extractSendvidId(v);const prev=document.getElementById('svPrev');const err=document.getElementById('svErr');const embed=document.getElementById('svEmbed');if(!v.trim()){prev.textContent='';err.textContent='';embed.innerHTML='';return;}if(id){prev.textContent=`✅ ID：${id}  →  [xsendvid]${id}[/xsendvid]`;err.textContent='';embed.innerHTML=`<iframe src="https://sendvid.com/embed/${id}" style="width:100%;aspect-ratio:16/9;border-radius:6px;border:none;" allowfullscreen loading="lazy"></iframe>`;}else{prev.textContent='';err.textContent='❌ 無法解析 Sendvid ID，請確認網址格式';embed.innerHTML='';}}

/* ═══════════════════════════════════════════
   CATBOX AUTO-UPLOAD
═══════════════════════════════════════════ */
const CATBOX_API='https://catbox-proxy.good406441.workers.dev/';
const CATBOX_USERHASH='1955d4f3fdde85910d8657ba8';
let cbDoneUrls=[]; // finished uploads ready to insert

function cbHandleDrop(e){
  e.preventDefault();
  document.getElementById('cbDropZone').classList.remove('cb-drag-over');
  cbHandleFiles(e.dataTransfer.files);
}

function cbHandleFiles(files){
  if(!files||!files.length)return;
  cbDoneUrls=[];
  document.getElementById('cbInsertAll').style.display='none';
  [...files].forEach(file=>cbUploadOne(file));
}

async function cbUploadOne(file){
  const isVideo=/\.(mp4|mov|webm)$/i.test(file.name);
  const isImg=/\.(jpe?g|png|gif|webp|bmp)$/i.test(file.name);
  if(!isVideo&&!isImg){showToast(`⚠️ 不支援的格式：${file.name}`);return;}
  if(file.size>200*1024*1024){showToast(`⚠️ 檔案超過 200MB：${file.name}`);return;}

  // Build queue item
  const id='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const queue=document.getElementById('cbQueue');
  if(!queue)return;
  const div=document.createElement('div');
  div.className='cb-item';div.id=id;

  // Thumbnail
  let thumbHtml='';
  if(isImg){
    const objUrl=URL.createObjectURL(file);
    thumbHtml=`<div class="cb-thumb"><img src="${objUrl}" onload="URL.revokeObjectURL(this.src)" onerror="this.parentElement.textContent='🖼'"></div>`;
  } else {
    thumbHtml=`<div class="cb-thumb">🎥</div>`;
  }

  div.innerHTML=`${thumbHtml}
  <div class="cb-info">
    <div class="cb-name">${escHtml(file.name)}</div>
    <div class="cb-status" id="${id}_st" style="color:var(--text2);">⏳ 準備上傳…</div>
    <div class="cb-bar-wrap"><div class="cb-bar" id="${id}_bar"></div></div>
    <div id="${id}_result"></div>
  </div>`;
  queue.appendChild(div);
  queue.scrollTop=queue.scrollHeight;

  const st=document.getElementById(id+'_st');
  const bar=document.getElementById(id+'_bar');
  const result=document.getElementById(id+'_result');

  try{
    if(st){st.textContent='⬆️ 上傳中…';st.style.color='var(--text2)';}
    if(bar){bar.style.width='60%';} // indeterminate progress

    const fd=new FormData();
    fd.append('reqtype','fileupload');
    fd.append('userhash', CATBOX_USERHASH);
    fd.append('fileToUpload',file);

    const res=await fetch(CATBOX_API,{method:'POST',body:fd});
    const json=await res.json();
    if(!json.url) throw new Error(json.error||'上傳失敗');
    const url=json.url;
    if(bar){bar.style.width='100%';bar.style.background='#22c55e';}
    if(st){st.textContent='✅ 上傳成功！';st.style.color='#22c55e';}
    if(result){
      result.innerHTML=`<div class="cb-url-row">
        <span class="cb-url-box" title="${url}" onclick="navigator.clipboard&&navigator.clipboard.writeText('${url}').then(()=>showToast('✅ 已複製連結'))">${url}</span>
        <button class="cb-insert-btn" onclick="cbInsertOne('${url}','${isVideo?'vid':'img'}')">插入</button>
      </div>`;
    }
    addToGallery(url,isVideo?'vid':'img');
    cbDoneUrls.push({url,type:isVideo?'vid':'img'});
    cbCheckAllDone();

  }catch(err){
    console.error('Catbox upload error:',err);
    if(bar){bar.style.width='100%';bar.style.background='#ef4444';}
    if(st){st.textContent=`❌ 上傳失敗：${err.message}`;st.style.color='#ef4444';}
  }
}

function cbCheckAllDone(){
  // Show "insert all" button once at least one upload is done
  const insertAll=document.getElementById('cbInsertAll');
  if(insertAll&&cbDoneUrls.length>0)insertAll.style.display='block';
}

function cbInsertOne(url,type){
  const bb=type==='vid'?`[xmp4]${url}[/xmp4]\n`:`[ximg]${url}[/ximg]\n`;
  insertAtCursor(bb);
  showToast('✅ 已插入！');
}

function cbInsertAllDone(){
  if(!cbDoneUrls.length){showToast('⚠️ 尚無完成的上傳');return;}
  let code='';
  cbDoneUrls.forEach(({url,type})=>{
    code+=type==='vid'?`[xmp4]${url}[/xmp4]\n`:`[ximg]${url}[/ximg]\n`;
  });
  insertAtCursor(code);
  showToast(`✅ 已插入 ${cbDoneUrls.length} 個檔案！`);
  closeModal();
}

/* ── Catbox Tab 切換 ── */
function cbSwitchTab(tab){
  const isAuto=tab==='auto';
  const tabAuto=document.getElementById('cbTabAuto');
  const tabManual=document.getElementById('cbTabManual');
  const paneAuto=document.getElementById('cbPaneAuto');
  const paneManual=document.getElementById('cbPaneManual');
  if(!tabAuto||!tabManual||!paneAuto||!paneManual)return;
  tabAuto.style.background=isAuto?'var(--gold)':'var(--surface2)';
  tabAuto.style.color=isAuto?'#000':'var(--text2)';
  tabManual.style.background=isAuto?'var(--surface2)':'var(--gold)';
  tabManual.style.color=isAuto?'var(--text2)':'#000';
  paneAuto.style.display=isAuto?'':'none';
  paneManual.style.display=isAuto?'none':'';
}

/* ── Catbox 手動輸入 ── */
let cbManType='img';
function cbSetManType(type){
  cbManType=type;
  const imgBtn=document.getElementById('cbManTypeImg');
  const vidBtn=document.getElementById('cbManTypeVid');
  if(!imgBtn||!vidBtn)return;
  imgBtn.className=type==='img'?'btn btn-gold':'btn btn-ghost';
  imgBtn.style.flex='1';imgBtn.style.fontSize='12px';
  vidBtn.className=type==='vid'?'btn btn-gold':'btn btn-ghost';
  vidBtn.style.flex='1';vidBtn.style.fontSize='12px';
  cbPrevManual();
}
function cbPrevManual(){
  const el=document.getElementById('cbManUrl');
  const v=el?el.value.trim():'';
  const err=document.getElementById('cbManErr');
  const prev=document.getElementById('cbManPrev');
  if(!err||!prev)return;
  if(!v){err.textContent='';prev.innerHTML='';return;}
  if(!/^https?:\/\//i.test(v)){err.textContent='❌ 請貼上有效的 https:// 網址';prev.innerHTML='';return;}
  err.textContent='';
  if(cbManType==='img'){
    prev.innerHTML=`<div style="font-size:11px;color:#22c55e;margin-bottom:5px;">✅ 圖片預覽</div>
      <img src="${v}" style="max-width:100%;max-height:160px;border-radius:6px;display:block;" onerror="this.parentElement.innerHTML='<div style=\\'font-size:11px;color:#ef4444;\\'>❌ 無法載入圖片，請確認連結</div>'">`;
  } else {
    prev.innerHTML=`<div style="font-size:11px;color:#22c55e;margin-bottom:5px;">✅ 影片預覽</div>
      <video src="${v}" controls style="max-width:100%;max-height:180px;border-radius:6px;display:block;" onerror="this.parentElement.innerHTML='<div style=\\'font-size:11px;color:#ef4444;\\'>❌ 無法載入影片，請確認連結</div>'"></video>`;
  }
}
function cbInsertManual(){
  const el=document.getElementById('cbManUrl');
  const v=el?el.value.trim():'';
  if(!v){showToast('❌ 請貼上 Catbox 連結');return;}
  if(!v.startsWith('http')){showToast('❌ 請貼上有效的網址');return;}
  if(cbManType==='img'){addToGallery(v,'img');insertAtCursor(`[ximg]${v}[/ximg]\n`);}
  else{addToGallery(v,'vid');insertAtCursor(`[xmp4]${v}[/xmp4]\n`);}
  showToast('✅ 已插入！');
  closeModal();
}

function prevPostimg(){const el=document.getElementById('piUrl');const v=el?el.value.trim():'';const err=document.getElementById('piErr');const imgp=document.getElementById('piImgPrev');if(!v){err.textContent='';imgp.innerHTML='';return;}const m=v.match(/\[url=([^\]]+)\]\[img\]([^\[]+)\[\/img\]\[\/url\]/);if(m){const imgSrc=m[2].trim();err.textContent='';imgp.innerHTML=`<div style="font-size:11px;color:#22c55e;margin-bottom:6px;">✅ 格式正確，可以插入</div><img src="${imgSrc}" style="max-width:100%;max-height:180px;border-radius:6px;display:block;" onerror="this.style.display='none'">`;}else{err.textContent='❌ 格式不符，請貼上 Postimages「論壇外連」的完整代碼，格式為 [url=...][img]...[/img][/url]';imgp.innerHTML='';}}

/* ═══════════════════════════════════════════
   CONFIRM INSERT
═══════════════════════════════════════════ */
function confirmInsert(){
  let code='';
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  switch(currentTag){
    case 'xgold':case 'xcenter':case 'xgban':case 'xnote':case 'xwarn':case 'xblue':case 'xgreen':case 'xred':case 'xinfo':case 'xglass':case 'xtag':
      code=`[${currentTag}]${g('f1')}[/${currentTag}]\n`;break;
    case 'xspoiler': code=`[xspoiler=${g('f1')}]${g('f2')}[/xspoiler]\n`;break;
    case 'xsmall': code=`[xsmall]${g('f1')}[/xsmall]\n`;break;
    case 'xcard': code=`[xcard=${g('f1')}]${g('f2')}[/xcard]\n`;break;
    case 'quote':case 'xquote': code=`[${currentTag}]${g('f1')}[/${currentTag}]\n`;break;
    case 'xrate': code=`[xrate]${g('f1')}[/xrate]\n`;break;
    case 'xbtn': code=`[xbtn=${g('f1')}]${g('f2')}[/xbtn]\n`;break;
    case 'xyoutube':case 'xsyoutube':{const id=extractYTId(g('f1'));if(!id){showToast('❌ 無法解析 YouTube ID');return;}addToGallery(id,'yt');code=`[${currentTag}]${id}[/${currentTag}]\n`;break;}
    case 'xtiktok':{const id=extractTTId(g('f1'));if(!id){showToast('❌ 無法解析 TikTok ID');return;}addToGallery(id,'tt');code=`[xtiktok]${id}[/xtiktok]\n`;break;}
    case 'xmp4':case 'xvmp4':{const u=g('f1');if(u)addToGallery(u,'vid');code=`[${currentTag}]${u}[/${currentTag}]\n`;break;}
    case 'xmp3': code=`[xmp3]${g('f1')}[/xmp3]\n`;break;
    case 'xsound': code=`[xsound]${g('f1')}[/xsound]\n`;break;
    case 'xsendvid':{const id=extractSendvidId(g('f1'));if(!id){showToast('❌ 無法解析 Sendvid ID');return;}addToGallery(id,'sendvid');code=`[xsendvid]${id}[/xsendvid]\n`;break;}
    case 'xmap': code=`[xmap]${g('f1')}[/xmap]\n`;break;
    case 'xmaplink': code=`[xmaplink]${g('f1')}[/xmaplink]\n`;break;
    case 'ximg':{const url=g('f1');if(url)addToGallery(url,'img');code=`[ximg]${url}[/ximg]\n`;break;}
    case 'catbox':{/* handled by auto-upload buttons, no-op here */break;}
    case 'postimages':{const el=document.getElementById('piUrl');const raw=el?el.value.trim():'';if(!raw){showToast('❌ 請貼上論壇外連代碼');return;}const m=raw.match(/\[url=([^\]]+)\]\[img\]([^\[]+)\[\/img\]\[\/url\]/);if(!m){showToast('❌ 格式不符，請貼上論壇外連代碼');return;}addToGallery(m[2].trim(),'img');code=raw+'\n';break;}
    case 'dialog':{const rows=[...document.querySelectorAll('#dialogRows .dialog-row')];code=rows.map(r=>{const side=r.dataset.side;const txt=r.querySelector('input').value.trim();return txt?`[x${side}]${txt}[/x${side}]`:''}).filter(Boolean).join('')+'\n';break;}
    case 'xtable':{
      const head=g('tblHead');
      const headerCells=[...document.querySelectorAll('#tblHeaderRow .tbl-header-cell')].map(i=>i.value.trim());
      const dataRows=[...document.querySelectorAll('#tblRows .tbl-row')];
      const colCount=tblColCount;
      if(colCount===1){
        const rows=dataRows.map(r=>{const cells=[...r.querySelectorAll('.tbl-cell')];return{k:headerCells[0]||'',v:cells[0]?cells[0].value.trim():''};}).filter(r=>r.v);
        code=`[xthead]${head}[/xthead]\n`+rows.map(r=>`[xtr=${r.k}]${r.v}[/xtr]`).join('\n')+'\n';
      } else {
        code=`[xthead]${head}[/xthead]\n`;
        if(headerCells.some(c=>c)){code+=`[xtr=${headerCells[0]||''}]${headerCells.slice(1).join('|')}[/xtr]\n`;}
        dataRows.forEach(r=>{const cells=[...r.querySelectorAll('.tbl-cell')].map(i=>i.value.trim());if(cells.some(c=>c))code+=`[xtr=${cells[0]||''}]${cells.slice(1).join('|')}[/xtr]\n`;});
      }
      break;}
    case 'hide':{const num=String(parseInt(g('f1')||'0',10));const type_=g('f2');const cnt=g('f3');code=`[hide=${num},${type_}]${cnt}[/hide]\n`;break;}
    case 'sell':{const amt=String(parseInt(g('f1')||'0',10));const cnt=g('f2');code=`[sell=${amt}]${cnt}[/sell]\n`;break;}
    case 'size':{const s=g('f1');if(!s){closeModal();return;}const txt=savedSel.text||'文字';code=`[size=${s}]${txt}[/size]`;break;}
    case 'colorpicker':{const c=selectedColor;const txt=savedSel.text||'文字';code=`[${colorModalTag}=${c}]${txt}[/${colorModalTag}]`;break;}
  }
  if(code){insertAtCursor(code);showToast(t('insert_ok'));}
  closeModal();
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function closeModalOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();if(currentPanel4)closePanel4();}
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('active')){
    const a=document.activeElement;
    if(a&&a.tagName!=='TEXTAREA'&&a.tagName!=='SELECT'&&!a.classList.contains('tbl-add-btn')&&a.id!=='modalOK'){e.preventDefault();confirmInsert();}
  }
});

/* ═══════════════════════════════════════════
   PREVIEW RENDERER
═══════════════════════════════════════════ */
function updatePreview(){
  let h=editor.value;
  // Escape raw HTML first
  h=h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Extract [code] blocks
  const codePlaceholders=[];
  h=h.replace(/\[code\]([\s\S]*?)\[\/code\]/g,(match,inner)=>{
    const escaped=inner.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\[/g,'&#91;').replace(/\]/g,'&#93;');
    const ph=`«code${codePlaceholders.length}»`;
    codePlaceholders.push(`<pre style="background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:10px;font-family:monospace;font-size:12px;white-space:pre-wrap;overflow-x:auto;">${escaped}</pre>`);
    return ph;
  });
  // basic format
  h=h.replace(/\[b\]([\s\S]*?)\[\/b\]/g,'<b>$1</b>');
  h=h.replace(/\[i\]([\s\S]*?)\[\/i\]/g,'<i>$1</i>');
  h=h.replace(/\[u\]([\s\S]*?)\[\/u\]/g,'<u>$1</u>');
  h=h.replace(/\[strike\]([\s\S]*?)\[\/strike\]/g,'<s>$1</s>');
  h=h.replace(/\[fly\]([\s\S]*?)\[\/fly\]/g,'<span style="display:inline-block;animation:flyText 3s linear infinite;white-space:nowrap;">$1</span>');
  h=h.replace(/\[move\]([\s\S]*?)\[\/move\]/g,'<marquee scrollamount="3" style="display:block;">$1</marquee>');
  h=h.replace(/\[size=(\d+)\]([\s\S]*?)\[\/size\]/g,(_,s,c)=>`<span style="font-size:${8+parseInt(s)*2}px">${c}</span>`);
  h=h.replace(/\[color=(#[0-9a-fA-F]{3,8}|[a-z]+)\]([\s\S]*?)\[\/color\]/g,'<span style="color:$1">$2</span>');
  h=h.replace(/\[backcolor=(#[0-9a-fA-F]{3,8}|[a-z]+)\]([\s\S]*?)\[\/backcolor\]/g,'<span style="background:$1;padding:0 2px;">$2</span>');
  h=h.replace(/\[align=left\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:left">$1</div>');
  h=h.replace(/\[align=center\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:center">$1</div>');
  h=h.replace(/\[align=right\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:right">$1</div>');
  h=h.replace(/\[hr\]/g,'<hr style="border:none;border-top:1px solid #ccc;margin:10px 0;opacity:.7;">');
  // url+img (Postimages)
  h=h.replace(/\[url=([^\]]+)\]\[img\]([\s\S]*?)\[\/img\]\[\/url\]/g,(_,href,src)=>`<a href="${href}" target="_blank"><img class="forum-img" src="${src.trim()}" onerror="this.style.display='none'"></a>`);
  h=h.replace(/\[url=([^\]]+)\]\[ximg\]([\s\S]*?)\[\/ximg\]\[\/url\]/g,(_,href,src)=>`<a href="${href}" target="_blank"><img class="forum-img ximg-img" src="${src.trim()}" onerror="this.style.display='none'"></a>`);
  h=h.replace(/\[url\]([\s\S]*?)\[\/url\]/g,'<a href="$1" style="color:#3b82f6" target="_blank">$1</a>');
  h=h.replace(/\[url=([^\]]+)\]([\s\S]*?)\[\/url\]/g,'<a href="$1" style="color:#3b82f6" target="_blank">$2</a>');
  // xhr
  h=h.replace(/\[xhr\]x\[\/xhr\]/g,'<hr class="xhr-line">');
  // block map
  const bm=[
    ['xgold',c=>`<div class="xgold-box">${c}</div>`],
    ['xcenter',c=>`<div class="xcenter-box">${c}</div>`],
    ['xgban',c=>`<div class="xgban-box">${c}</div>`],
    ['xnote',c=>`<div class="xnote-box">${c}</div>`],
    ['xwarn',c=>`<div class="xwarn-box">${c}</div>`],
    ['xblue',c=>`<div class="xblue-box">${c}</div>`],
    ['xgreen',c=>`<div class="xgreen-box">${c}</div>`],
    ['xred',c=>`<div class="xred-box">${c}</div>`],
    ['xinfo',c=>`<div class="xinfo-box">${c}</div>`],
    ['xglass',c=>`<div class="xglass-box">${c}</div>`],
    ['xquote',c=>`<div class="xquote-box">${c}</div>`],
    ['quote',c=>`<div class="quote-box">${c}</div>`],
    ['xtag',c=>`<span class="xtag-pill">${c}</span>`],
    ['xrate',c=>`<span class="xrate-badge">★ ${c} / 10</span>`],
    ['xsmall',c=>`<span class="xsmall-text">${c}</span>`],
    ['ximg',c=>`<img class="forum-img ximg-img" src="${c}" onerror="this.style.display='none'">`],
    ['img',c=>`<img class="forum-img" src="${c}" onerror="this.style.display='none'">`],
    ['xmp4',c=>`<video class="forum-img" controls style="max-width:100%;border-radius:6px;margin:4px 0;"><source src="${c}" type="video/mp4">MP4: ${c}</video>`],
    ['xvmp4',c=>`<video class="forum-img" controls style="max-width:320px;border-radius:6px;margin:4px 0;"><source src="${c}" type="video/mp4">MP4: ${c}</video>`],
    ['xmp3',c=>`<audio controls style="width:100%;margin:6px 0;"><source src="${c}" type="audio/mpeg">MP3: ${c}</audio>`],
    ['xsound',c=>{const encoded=encodeURIComponent(c.trim());return `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" loading="lazy" style="border-radius:8px;margin:6px 0;" src="https://w.soundcloud.com/player/?url=${encoded}&color=%23f0b429&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>`;}],
    ['xmaplink',c=>`<div style="margin:6px 0"><div class="media-ph" style="margin-bottom:4px;">📍 <a href="https://www.google.com/maps/search/${encodeURIComponent(c)}" target="_blank" style="color:#3b82f6">🗺 在 Google Maps 搜尋「${c}」</a></div><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(c)}&output=embed&z=15" style="width:100%;height:200px;border:none;border-radius:8px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`],
    ['xmap',c=>`<div style="margin:6px 0"><div class="media-ph" style="margin-bottom:4px;">🗺 <a href="https://www.google.com/maps?q=${encodeURIComponent(c)}" target="_blank" style="color:#3b82f6">在 Google Maps 查看座標 ${c}</a></div><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(c)}&output=embed&z=15" style="width:100%;height:200px;border:none;border-radius:8px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`],
  ];
  for(const [tag,fn] of bm){
    h=h.replace(new RegExp(`\\[${tag}\\]([\\s\\S]*?)\\[\\/${tag}\\]`,'g'),(_,c)=>fn(c.trim()));
  }
  // YouTube
  h=h.replace(/\[xyoutube\]([\s\S]*?)\[\/xyoutube\]/g,(_,id)=>`<iframe class="yt-embed" src="https://www.youtube.com/embed/${id.trim()}" allowfullscreen loading="lazy"></iframe>`);
  h=h.replace(/\[xsyoutube\]([\s\S]*?)\[\/xsyoutube\]/g,(_,id)=>`<iframe style="width:280px;aspect-ratio:9/16;max-height:500px;border-radius:10px;border:none;margin:6px 0;display:block;" src="https://www.youtube.com/embed/${id.trim()}" allowfullscreen loading="lazy"></iframe>`);
  // TikTok
  h=h.replace(/\[xtiktok\]([\s\S]*?)\[\/xtiktok\]/g,(_,id)=>{const tid=id.trim();return `<div style="display:flex;flex-direction:column;align-items:flex-start;margin:6px 0;"><iframe src="https://www.tiktok.com/embed/v2/${tid}" style="width:280px;height:500px;border-radius:10px;border:none;display:block;" allowfullscreen loading="lazy"></iframe><div class="media-ph" style="margin-top:4px;font-size:11px;">🎶 TikTok ID: <a href="https://www.tiktok.com/video/${tid}" target="_blank" style="color:#3b82f6">${tid}</a></div></div>`;});
  // Sendvid
  h=h.replace(/\[xsendvid\]([\s\S]*?)\[\/xsendvid\]/g,(_,id)=>`<iframe src="https://sendvid.com/embed/${id.trim()}" style="width:100%;aspect-ratio:16/9;border-radius:6px;border:none;margin:6px 0;display:block;" allowfullscreen loading="lazy"></iframe>`);
  // xspoiler
  h=h.replace(/\[xspoiler=([^\]]+)\]([\s\S]*?)\[\/xspoiler\]/g,(_,btn,body)=>{const id='sp'+Math.random().toString(36).slice(2,7);return `<div class="xspoiler-wrap"><div id="${id}_btn" onclick="(function(){var b=document.getElementById('${id}_body'),a=document.getElementById('${id}_btn');var open=b.style.display!=='none';b.style.display=open?'none':'block';a.innerHTML=(open?'▶ ':'▼ ')+'${btn.replace(/'/g,"\\'")}';})();" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 12px;background:#f0f0f0;border:1px solid #ddd;border-radius:5px;font-size:13px;user-select:none;">▶ ${btn}</div><div id="${id}_body" style="display:none;padding:10px 14px;background:#fafafa;border:1px solid #ddd;border-top:none;border-radius:0 0 5px 5px;font-size:13px;color:#333;">${body.trim()}</div></div>`;});
  // xcard
  h=h.replace(/\[xcard=([^\]]+)\]([\s\S]*?)\[\/xcard\]/g,(_,t_,b)=>`<div class="xcard-box"><div class="xcard-title">${t_}</div><div class="xcard-body">${b.trim()}</div></div>`);
  // xbtn
  h=h.replace(/\[xbtn=([^\]]+)\]([\s\S]*?)\[\/xbtn\]/g,(_,url,text)=>`<a class="xbtn-link" href="${url}" target="_blank">${text.trim()}</a>`);
  // dialog
  h=h.replace(/\[xleft\]([\s\S]*?)\[\/xleft\]/g,(_,c)=>`<div class="xleft-bubble"><span>${c.trim()}</span></div>`);
  h=h.replace(/\[xright\]([\s\S]*?)\[\/xright\]/g,(_,c)=>`<div class="xright-bubble"><span>${c.trim()}</span></div>`);
  // table
  h=h.replace(/\[xthead\]([\s\S]*?)\[\/xthead\]((?:\s*\[xtr=[^\]]+\][\s\S]*?\[\/xtr\])*)/g,(_,head,rest)=>{const rows=[...rest.matchAll(/\[xtr=([^\]]+)\]([\s\S]*?)\[\/xtr\]/g)].map(([,k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('');return `<table class="xtable"><tr><th colspan="2">${head.trim()}</th></tr>${rows}</table>`;});
  h=h.replace(/\[xtr=[^\]]+\][\s\S]*?\[\/xtr\]/g,'');
  // emoji
  h=h.replace(/\[s:(\d+)\]/g,(_,n)=>{let url='';if(typeof emojiData!=='undefined'){for(const cat of emojiData){for(const page of cat.pages){const found=page.find(e=>e.code===`[s:${n}]`);if(found){url=found.url;break;}}if(url)break;}}if(url)return `<img src="${url}" style="width:36px;height:36px;object-fit:contain;vertical-align:middle;" loading="lazy" alt="[s:${n}]">`;return `[s:${n}]`;});
  // hide / sell
  const hideTypes={'1':'發文數','2':'超激值','3':'回應好評度','4':'發文好評度','5':'熱心好評度','6':'歲月值'};
  h=h.replace(/\[sell=(\d+)\]([\s\S]*?)\[\/sell\]/g,(_,amt,cnt)=>`<div style="background:#fffbe6;border:1px solid #e6d87a;border-radius:6px;padding:10px 14px;margin:8px 0;"><div style="font-size:12px;color:#888;margin-bottom:8px;">💡 此帖售價 <b style="color:#b8860b;">${amt}</b> 流金幣，已有 0 人購買 <span style="color:#aaa;font-size:11px;">[記錄] [購買]</span></div><div style="background:#f5f5f5;border-radius:4px;padding:8px 12px;font-size:13px;color:#555;">${cnt.trim()}</div></div>`);
  h=h.replace(/\[hide=(\d+),(\d+)\]([\s\S]*?)\[\/hide\]/g,(_,num,type,cnt)=>`<div class="hide-box"><div style="margin-bottom:6px;">🔒 需要 ${num} ${hideTypes[type]||'歲月值'} 才能觀看</div><div style="padding:8px;border-radius:5px;background:rgba(0,0,0,0.04);font-size:12px;color:#555;border:1px dashed #ddd;">${cnt.trim()||'（無內容）'}</div></div>`);
  h=h.replace(/\[hide=(\d+)\]([\s\S]*?)\[\/hide\]/g,(_,num,cnt)=>`<div class="hide-box"><div style="margin-bottom:6px;">🔒 需要 ${num} 歲月值 才能觀看</div><div style="padding:8px;border-radius:5px;background:rgba(0,0,0,0.04);font-size:12px;color:#555;border:1px dashed #ddd;">${cnt.trim()||'（無內容）'}</div></div>`);
  // newline
  h=h.replace(/\n/g,'<br>');
  // Restore code blocks
  codePlaceholders.forEach((html,i)=>{h=h.replace(`«code${i}»`,html);});
  document.getElementById('preview').innerHTML=h||'<p style="color:#aaa;font-size:13px;text-align:center;margin-top:50px;">← 從左側選擇標籤開始</p>';
  // 若合併模式的 overlay 正在顯示，同步更新它
  const overlay=document.getElementById('previewOverlay');
  const overlayBody=document.getElementById('previewOverlayBody');
  if(overlay&&overlayBody&&overlay.style.display!=='none'){
    overlayBody.innerHTML=document.getElementById('preview').innerHTML;
  }
}

let emojiTabIdx=0;
let emojiPageIdx=[0,0,0];
function toggleEmojiPanel(e){e.stopPropagation();const overlay=document.getElementById('emojiOverlay');const isActive=overlay.classList.contains('active');if(isActive){overlay.classList.remove('active');}else{renderEmojiPanel();overlay.classList.add('active');}}
function closeEmojiPanel(e){if(e.target===document.getElementById('emojiOverlay')){document.getElementById('emojiOverlay').classList.remove('active');}}
function switchEmojiTab(idx,btn,e){if(e)e.stopPropagation();emojiTabIdx=idx;document.querySelectorAll('.emoji-tab').forEach((t,i)=>{t.classList.toggle('active',i===idx);});renderEmojiGrid();}
function switchEmojiPage(pageIdx,e){if(e)e.stopPropagation();emojiPageIdx[emojiTabIdx]=pageIdx;renderEmojiGrid();}
function renderEmojiPanel(){renderEmojiGrid();}
function renderEmojiGrid(){const tab=emojiData[emojiTabIdx];const pageIdx=emojiPageIdx[emojiTabIdx];const page=tab.pages[pageIdx];const pagesDiv=document.getElementById('emojiPages');const paginDiv=document.getElementById('emojiPagination');const gridHTML=page.map(item=>`<button class="emoji-item" onclick="insertEmoji('${item.code}')" title="${item.code}"><img src="${item.url}" loading="lazy" alt="${item.code}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="emoji-code" style="display:none">${item.code}</div></button>`).join('');pagesDiv.innerHTML=`<div class="emoji-page active"><div class="emoji-grid">${gridHTML}</div></div>`;const totalPages=tab.pages.length;if(totalPages<=1){paginDiv.innerHTML='';return;}const btns=Array.from({length:totalPages},(_,i)=>`<button class="emoji-page-btn${i===pageIdx?' active':''}" onclick="event.stopPropagation();switchEmojiPage(${i})">${i+1}</button>`).join('');paginDiv.innerHTML=btns;}
function insertEmoji(code){insertAtCursor(code);document.getElementById('emojiOverlay').classList.remove('active');}
document.addEventListener('click',e=>{const overlay=document.getElementById('emojiOverlay');const trigger=document.getElementById('emojiBtnTrigger');const panel=document.getElementById('emojiPanel');if(overlay&&overlay.classList.contains('active')){if(panel&&!panel.contains(e.target)&&e.target!==trigger){overlay.classList.remove('active');}}});
</script>
